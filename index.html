<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>河内塔3D游戏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <h1>河内塔 3D 益智游戏</h1>
    <div class="control-box">
      <label>圆盘数量：</label>
      <input type="number" id="diskNum" min="3" max="8" value="3">
      <input type="range" id="diskRange" min="3" max="8" value="3">
      <button id="reset">重置游戏</button>
      <button id="autoPlay">自动解题</button>
      <span>步数：<span id="stepCount">0</span></span>
    </div>
  </div>

  <div class="game-box">
    <div class="tower" data-id="0">
      <div class="pole"></div>
      <div class="disk-box"></div>
    </div>
    <div class="tower" data-id="1">
      <div class="pole"></div>
      <div class="disk-box"></div>
    </div>
    <div class="tower" data-id="2">
      <div class="pole"></div>
      <div class="disk-box"></div>
    </div>
  </div>

  <!-- 提示弹窗 -->
  <div class="modal" id="warnModal">违规移动，大盘不能放小盘上！</div>
  <div class="modal" id="winModal">🎉 恭喜通关！挑战成功</div>

  <script src="script.js"></script>
</body>
</html>
